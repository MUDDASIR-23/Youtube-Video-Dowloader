<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Video Downloader - Free & Online</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎬 YouTube Video Downloader</h1>
            <p>Free & Fast - Download 4K & 2K Videos</p>
        </header>

        <main>
            <div class="input-section">
                <input 
                    type="text" 
                    id="videoUrl" 
                    placeholder="Paste YouTube URL here..." 
                    class="url-input"
                >
                <button id="fetchBtn" class="btn-primary">Fetch Video</button>
            </div>

            <div id="loadingSpinner" class="spinner hidden"></div>

            <div id="videoInfo" class="video-info hidden">
                <div class="video-preview">
                    <img id="thumbnail" src="" alt="Video Thumbnail">
                </div>
                <div class="video-details">
                    <h3 id="videoTitle"></h3>
                    <p id="videoDuration"></p>
                    <p id="videoAuthor"></p>
                </div>
            </div>

            <div id="qualityOptions" class="quality-options hidden">
                <h3>Select Quality</h3>
                <div id="qualityList" class="quality-list"></div>
                <button id="downloadBtn" class="btn-download hidden">Download Video</button>
            </div>

            <div id="downloadProgress" class="progress hidden">
                <div class="progress-bar">
                    <div id="progressFill" class="progress-fill"></div>
                </div>
                <p id="progressText">0%</p>
            </div>

            <div id="errorMessage" class="error hidden"></div>
            <div id="successMessage" class="success hidden"></div>
        </main>

        <footer>
            <p>⚡ Fast, Safe & Free | No Registration Required</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
